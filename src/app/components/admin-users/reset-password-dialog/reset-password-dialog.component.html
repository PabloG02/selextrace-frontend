<h2 mat-dialog-title>Reset Password</h2>

<mat-dialog-content>
  <p>
    Set a temporary password for <strong>{{ data.username }}</strong>. The user will be required to change it upon their next login.
  </p>

  <mat-form-field appearance="outline" subscriptSizing="dynamic">
    <mat-label>Temporary password</mat-label>
    <input
      matInput
      type="password"
      [(ngModel)]="password"
      (keyup.enter)="onSubmit()"
    />
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="primary" [disabled]="!password().trim()" (click)="onSubmit()">
    Reset Password
  </button>
</mat-dialog-actions>
