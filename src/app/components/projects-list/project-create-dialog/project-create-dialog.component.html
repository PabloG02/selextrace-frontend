<h2 mat-dialog-title>Create Project</h2>
<mat-dialog-content>
  <form class="create-form" [formGroup]="form" (ngSubmit)="create()">
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>

    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Description</mat-label>
      <textarea matInput rows="3" formControlName="description"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button matButton="text" type="button" (click)="close()">Cancel</button>
  <button matButton="filled" type="button" (click)="create()">Create</button>
</mat-dialog-actions>
