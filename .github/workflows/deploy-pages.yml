name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --base-href "/${{ github.event.repository.name }}/" --output-path=dist

      - name: Configure SPA routing fallback
        run: cp dist/browser/index.html dist/browser/404.html

      - name: Disable Jekyll processing
        run: touch dist/browser/.nojekyll

      - name: Upload artifact for GH Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/browser

      - name: Zip frontend build for Release
        run: |
          cd dist/browser
          zip -r ../../frontend-build.zip .

      - name: Create release and upload Zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the existing release and tag (ignore failure if it's the first run)
          gh release delete latest --cleanup-tag -y || true

          # Create a new release pointing to the current commit and upload the zip
          gh release create latest frontend-build.zip \
            --title "Latest build" \
            --notes "Continuous frontend build generated from commit ${{ github.sha }}" \
            --prerelease

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
